# cargo-deny configuration per ADR-0007 section "Supply chain".
#
# License allow-list, advisory checks against RustSec, ban + source policy.
# Run locally before opening a PR:
#
#   cargo deny check
#
# CI runs this on every push and pull request via .github/workflows/ci.yml.
#
# Exceptions are added per-crate with a comment naming the crate and the
# reason. Soft-asserting "we'll allow this whole license class because it's
# everywhere" is exactly the failure mode CLAUDE.md rule 12 names.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ─────────────────────────────────────────────────────────────────────
# Advisories — RustSec advisory database. cargo-audit covers the same
# database from a different angle; running both is intentional per the
# session-5 handoff and ADR-0007 "cargo-deny and cargo-audit in CI".
# ─────────────────────────────────────────────────────────────────────
[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # S303 first-CI-green sweep: two `unic-ucd-*` unmaintained advisories
    # reach the graph via `tauri-utils → urlpattern → unic-ucd-ident →
    # unic-ucd-version`. cargo-deny reports "No safe upgrade is available"
    # — tauri 2.x hasn't bumped urlpattern past 0.3.0 yet. These are
    # build-time / no-network deps that don't widen our attack surface;
    # revisit when tauri ships an urlpattern bump.
    # ─── tauri-utils → urlpattern → unic-* (no safe upgrade) ───
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range unmaintained; same urlpattern → unic-* path as -0080/-0098/-0100." },
    { id = "RUSTSEC-2025-0080", reason = "unic-common unmaintained via tauri-utils → urlpattern → unic-ucd-ident → unic-ucd-version → unic-common; no safe upgrade." },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property unmaintained; same urlpattern → unic-* path." },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version unmaintained via tauri-utils → urlpattern; no safe upgrade. Tracking upstream tauri urlpattern bump." },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident unmaintained via tauri-utils → urlpattern; same path as -0098." },

    # ─── Tauri 2 Linux backend pulls GTK3 bindings (gtk-rs migrated
    # to GTK4 upstream but no GTK4-backed Tauri release exists yet).
    # All "unmaintained" — none are CVE-class. Revisit when Tauri
    # ships a GTK4 path. ───
    { id = "RUSTSEC-2024-0411", reason = "gdk unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0412", reason = "gdk-sys unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0413", reason = "atk unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0415", reason = "gtk unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0416", reason = "atk-sys unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0418", reason = "gtk-sys unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0419", reason = "gdkwayland-sys unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0420", reason = "gdkx11-sys unmaintained via Tauri GTK3 backend." },
    { id = "RUSTSEC-2024-0429", reason = "glib 0.18.x VariantStrIter unsoundness via Tauri GTK3 backend. Not directly used by ABERP; revisit when Tauri 2 ships a GTK4 path." },

    # ─── Older ecosystem crates still in transitive trees; none
    # ship CVE-class issues — all are unmaintained warnings. ───
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive via several proc-macro deps. Upstream has switched to proc-macro-error2 but cargo can't enforce that yet." },
    { id = "RUSTSEC-2024-0384", reason = "instant unmaintained; replaced upstream by web-time. Transitive via async-io / parking_lot test helpers." },
    { id = "RUSTSEC-2024-0388", reason = "derivative unmaintained; consider derive_more upstream. Transitive via Tauri ecosystem." },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; rustls 0.23.x pulls a transitional 2.x. Revisit when reqwest/rustls drop it." },

    # ─── Post-PROD_v2.27.76-freeze advisories (published AFTER the freeze;
    # cargo-deny fetches the latest RustSec DB at run time). ADR-0099
    # addendum (2026-07-06, owner Ervin): reachability-assessed
    # documented-ignore, CONFIG ONLY — NO dependency bumps (a plan §2
    # NON-GOAL). Real dep remediation is deferred to a future PROD
    # re-harden. Each entry carries a per-advisory reachability
    # justification; NONE is a blanket ignore. See adr/0099 §"Addendum". ───
    { id = "RUSTSEC-2026-0187", reason = "lopdf 0.34.0 stack overflow via deeply nested PDF objects. UNREACHABLE at runtime: prod code only GENERATES PDFs (invoice-pdf / aberp-quote-pdf render ABERP's own data); the only PDF-parse callsites (lopdf::Document::load_mem, pdf_extract::extract_text_from_mem) are inside #[cfg(test)] (aberp-quote-pdf/src/lib.rs:812 `mod tests`) round-tripping self-generated PDFs. No untrusted PDF is parsed. Loopback-only single-tenant desktop." },
    { id = "RUSTSEC-2026-0190", reason = "anyhow 1.0.102 unsoundness in Error::downcast_mut(). UNREACHABLE: `downcast_mut` is never called anywhere in ABERP source (grep-verified empty); anyhow is used only as an error-propagation type, so the vulnerable API is never exercised." },
    { id = "RUSTSEC-2026-0194", reason = "quick-xml 0.36.2 unbounded namespace-declaration allocation in NsReader (memory-exhaustion DoS). Low reachability: quick-xml parses only responses from known authenticated endpoints — NAV (HU tax authority) SOAP over pinned TLS, MNB (HU national bank) FX SOAP over TLS, LAN MTConnect telemetry — plus ABERP's own catalogue/XSD XML; no attacker-controlled internet input. Worst case is a DoS harming only the single local operator on a loopback-only single-tenant desktop." },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml 0.36.2 quadratic run time checking a start tag for duplicate attribute names (DoS). Same reachability envelope as RUSTSEC-2026-0194: known-endpoint / self-authored XML only, single-tenant loopback desktop, DoS-only blast radius." },
    { id = "RUSTSEC-2026-0185", reason = "quinn-proto 0.11.14 remote memory exhaustion via unbounded out-of-order QUIC stream reassembly. NOT COMPILED / unreachable: quinn-proto enters Cargo.lock only via reqwest's optional http3/QUIC path, which ABERP does NOT enable (workspace pins reqwest default-features=false, features=[rustls,gzip,stream,json] — no http3). `cargo tree -i quinn-proto` resolves to nothing in the active graph, so cargo-deny's feature-resolved scan never flags it (only cargo-audit's raw-lockfile scan sees the phantom entry); this ignore is a lockstep placeholder for that surface. The vulnerable QUIC reassembly code is never built into the binary, and ABERP only makes outbound HTTPS client requests to known NAV/MNB endpoints — it never runs a QUIC listener accepting inbound streams." },
]

# ─────────────────────────────────────────────────────────────────────
# Licenses — ADR-0007 names MIT, Apache-2.0, BSD-3-Clause, MPL-2.0.
# Apache-2.0 WITH LLVM-exception is the SPDX variant used by several
# RustCrypto crates; same Apache-2.0 terms with an extended patent grant.
# Anything else requires a per-crate exception entry with a comment.
# ─────────────────────────────────────────────────────────────────────
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "MPL-2.0",
    # S303 first-CI-green widening — all standard permissive,
    # non-copyleft, OSI-approved (or public-domain dedications). Each
    # entry below names the load-bearing transitive crate so a future
    # reader can decide whether removing the upstream dep is feasible.
    # ADR-0007 should be amended to ratify this list; for now the
    # widening is captured here because the dep tree already relies
    # on every one of them.
    "BSD-2-Clause",         # arrayref (→ blake3 → aberp)
    "ISC",                  # rustls-pemfile, untrusted, aws-lc-rs
    "CC0-1.0",              # tiny-keccak, typenum-style crates
    "CDLA-Permissive-2.0",  # webpki-roots
    "Zlib",                 # foldhash, slotmap
    "0BSD",                 # adler2 (via flate2)
    "Unicode-3.0",          # unicode-ident, icu_collections, etc.
]
confidence-threshold = 0.93
exceptions = []

# ABERP's own license is PolyForm-Noncommercial-1.0.0 (see LICENSE).
# Workspace members carry `publish = false` and reference the license via
# license-file. Every workspace path-dep crate trips
# `error[rejected]: failed to satisfy license requirements` because
# none of them set a `license = "..."` SPDX expression. They are all
# private (never published to crates.io); `private.ignore = true`
# tells cargo-deny to skip license checks for unpublished workspace
# members, matching the recommended posture for proprietary monorepos.
private = { ignore = true }

# ─────────────────────────────────────────────────────────────────────
# Bans — duplicate-version is warn-only because transitive deps often
# pull in multiple versions of common crates (e.g. windows-sys, syn).
# Wildcards are denied because Cargo.toml never uses them; this enforces
# that intentionally.
# ─────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path-deps (e.g. `aberp-quote-engine = { path = "..." }`)
# show up as wildcard versions to cargo-deny because no explicit
# version is written; this is the canonical Cargo idiom for in-repo
# crates. `allow-wildcard-paths = true` keeps the wildcard ban on
# crates.io deps (where it matters) while allowing the path-dep idiom.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# ─────────────────────────────────────────────────────────────────────
# Sources — only crates.io is permitted. Git dependencies require
# explicit allow entries with a comment justifying the source. ADR-0007
# §Supply chain ("pinned dependency versions") is materially weaker if
# arbitrary git URLs are accepted.
# ─────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

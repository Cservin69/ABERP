# ADR-0099 (PROD SAFE lane) opener-census cut-gate — the REQUIRED check.
#
# Ported from the editions saw-off cut-gate (Cservin69/ABERP-Editions
# .github/workflows/cut-gate.yml). Deliberately a standalone, TOOLCHAIN-FREE job:
# it runs the bash census gate (tools/cut_gate_opener_census.sh: CHECK P1 count-
# freeze + P2 fingerprint-freeze) PLUS the negative-probe harness with nothing but
# a checkout, so it gates in SECONDS and stays green independently of the heavy
# Rust+Tauri+DuckDB build in ci.yml. Its sole job is to make the PRE-H3 live-DB
# opener census un-growable at the prod line while durability (H1/H3) lands.
#
# NOTE (SAFE lane): the editions gate also asserts durability/edition-saw-off
# invariants (shared Handle, crash-safe checkpoint, mirror preserve-and-refuse,
# edition DB binding, storefront gating). NONE of that code exists in the frozen
# prod tree yet — it is the follow-up durability session (H1/H3) — so only the
# census-freeze mechanism is ported here. See cut_gate_opener_census.sh header.
#
# Because it needs no toolchain it can be a branch-protection required status
# check without making the gate hostage to an 8-minute build.
name: cut-gate
on:
  push:
    branches: [main, prod-durability-adr0099]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  opener-census:
    name: ADR-0099 opener-census cut-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Run opener-census cut-gate (CHECK P1 count + P2 fingerprint, ENFORCED)
        # Every ENFORCE_* flag explicit here as well as defaulted in the script,
        # so enforcement is visible at the CI surface and cannot be silently
        # weakened by a one-line script edit.
        env:
          ENFORCE_OPENER_CENSUS: "1"
          ENFORCE_OPENER_FINGERPRINTS: "1"
        run: bash tools/cut_gate_opener_census.sh

      - name: Prove the cut-gate has teeth (negative probes)
        # Plants each regression (count grow / new file / count-preserving swap /
        # alias-evasion) in a throwaway copy and asserts the gate FAILS — so a
        # green gate above is a meaningful signal, not a gate that can't go red.
        run: bash tools/cut_gate_negative_probes.sh

      - name: ADR-0099 H3 write-fork gate (ENFORCING)
        # The corrected zero-residual fork gate (CHECK 10M): every in-serve
        # audit write-fork must route through the shared aberp_db::Handle. The H3
        # opener migration reached ZERO (STEP 7 acceptance), so this is now
        # ENFORCING — it FAILS on ANY non-allow-listed in-serve write-fork. The
        # flag is explicit here as well as defaulted in the script so enforcement
        # is visible at the CI surface and cannot be silently weakened by a
        # one-line script edit. (The scanner-blind DÁP residual is secured by the
        # prod refuse-to-start guard — see tools/adr0099_write_fork_allowlist.txt.)
        env:
          ENFORCE_WRITE_FORK: "1"
        run: bash tools/cut_gate_write_fork.sh

      - name: Prove the write-fork gate has teeth (negative probes)
        # Synthetic scratch-file / stdin probes: detect a colocated fork, the
        # Addendum-3 SPLIT store-shape (DuckDbBillingStore::open(_).into_connection())
        # and its transitive 2-hop variant, EXCLUDE the Handle-served append and the
        # from_connection / open_in_memory seams, ignore cfg(test), honour the
        # allow-list, prove fail-closed (a de-gated scanner passes the real
        # write-forks), and pin the BLIND-SPOT invariant (the old colocated-only
        # model is silent on the invoice store-shape). A negative probe that cannot
        # fail is decoration.
        run: bash tools/cut_gate_write_fork_probes.sh

      - name: ADR-0099 H3 READ-fork gate (CHECK N, ENFORCING)
        # The DUAL of the write-fork gate. CHECK 10M is structurally blind to an
        # independent opener that READS the audit ledger: once any writer is on
        # the shared Handle (checkpoint disabled), a fresh Ledger::open reader
        # sees only the folded SUBSET — a silent torn read (proved in wave-2e).
        # The in-serve readers all migrated to Handle reads (STEP 7 acceptance),
        # so this is now ENFORCING — it FAILS on ANY non-allow-listed in-serve
        # read-fork. Flag explicit here as well as defaulted in the script. See
        # ADR-0099 §CHECK N for the static limitation (dual-context fns) + the
        # runtime-tripwire backstop.
        env:
          ENFORCE_READ_FORK: "1"
        run: bash tools/cut_gate_read_fork.sh

      - name: Prove the read-fork gate has teeth (negative probes)
        # Synthetic scratch-file probes: detect a pure reader, EXCLUDE an appender
        # (write-fork) and the from_connection seam, ignore cfg(test), honour the
        # allow-list, and prove fail-closed (a de-gated scanner passes the real
        # read-forks). A negative probe that cannot fail is decoration.
        run: bash tools/cut_gate_read_fork_probes.sh

      - name: ADR-0100 Phase 1 keychain-seam gate (ENFORCING)
        # Every keychain access must route through the aberp-secret-store
        # SecretStore seam (ADR-0100 §5). Phase 1 reached ZERO direct keychain
        # sites outside the seam crate + its designated test mocks, so this is
        # ENFORCING — it FAILS on ANY direct keyring access (keyring::, aliased
        # `use keyring::Entry as X`, wildcard `use keyring::*`, `::keyring::`,
        # `.get/.set/.delete_password(`, `Entry::new_with_target`) in runtime
        # code outside the seam. Flag explicit here as well as defaulted in the
        # script so enforcement is visible at the CI surface and cannot be
        # silently weakened by a one-line script edit. (cargo test also runs this
        # gate via apps/aberp/tests/keychain_seam_gate.rs.)
        env:
          ENFORCE_KEYCHAIN_SEAM: "1"
        run: bash tools/cut_gate_keychain_seam.sh

      - name: Prove the keychain-seam gate has teeth (negative probes)
        # Synthetic scratch-file probes: plant each bypass form (qualified /
        # aliased / wildcard keyring import, `.get_password(`, `new_with_target`)
        # and assert RED; assert a comment/string mention and a #[cfg(test)]
        # inline mock stay GREEN; exclude the seam crate + tests/ mocks; and prove
        # fail-closed (a de-gated scanner passes the real bypass). A negative
        # probe that cannot fail is decoration.
        run: bash tools/cut_gate_keychain_seam_probes.sh

      - name: ADR-0093 product-line saw-off ratchet (ENFORCING)
        # The saw-off deleted the Portable/Defense surface from ABERP.git as a
        # ONE-TIME event with no ratchet behind it: re-adding run/run_portable.sh,
        # SAW-OFF.md and a crates/aberp-portable/ crate to a tree copy left ALL
        # EIGHT pre-existing gates green. This is that ratchet — launcher path,
        # edition crate (directory OR Cargo package name), SAW-OFF.md, and
        # PROD_(Portable|Defense)_v* refs local and on origin. It matches
        # STRUCTURE ONLY, never file contents, so the prune records, ADR-0093 and
        # upgrade_prod_version_re_test.sh may keep naming these strings. Flag
        # explicit here as well as defaulted in the script so enforcement is
        # visible at the CI surface and cannot be silently weakened by a one-line
        # script edit.
        env:
          ENFORCE_EDITION_RATCHET: "1"
        run: bash tools/cut_gate_edition_ratchet.sh

      - name: Prove the saw-off ratchet has teeth (negative probes)
        # Re-adds each artifact to a synthetic post-saw-off tree and asserts RED,
        # removes it and asserts GREEN — every arm, both directions. Also pins the
        # NON-triggers: the prune records, ADR-0093, the version-regex test, the
        # deliberately kept portable_demo_boot_e2e.rs, the worktree-* branch and
        # the archive/ ref namespace must all stay green. A gate that cries wolf
        # gets disabled, so the false-positive sources are pinned as hard as the
        # true positives.
        run: bash tools/cut_gate_edition_ratchet_probes.sh
